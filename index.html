<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Renegade Retro — HTML5</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-bar">
      <h1>Renegade Retro</h1>
      <div class="hud">
        <span id="levelLabel" aria-live="polite">Stage 1</span>
        <span id="scoreLabel">Score: 0</span>
        <span id="playerHealth">HP: 100</span>
      </div>
      <button id="helpButton" class="icon-btn" title="Show controls and tips" aria-label="Show controls and tips">❔ Help</button>
    </header>

    <main class="game-shell">
      <canvas id="gameCanvas" width="960" height="540" aria-label="Renegade style game canvas"></canvas>
      <aside class="panel" id="helpPanel" hidden>
        <h2>Controls</h2>
        <ul>
          <li><b>Move:</b> Arrow Keys / A, D</li>
          <li><b>Jump:</b> W or ↑</li>
          <li><b>Punch:</b> J</li>
          <li><b>Kick:</b> K</li>
          <li><b>Special:</b> L</li>
        </ul>
        <h3>Tips</h3>
        <p>Combo punches and kicks to stun enemies. Specials consume stamina, use them against bosses.</p>
      </aside>
    </main>

    <footer class="status-bar" id="messageBar">Fight through all 3 stages and defeat each boss.</footer>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
